name: Auction Radar ingest

# Keeps the live feed fresh by re-ingesting Bring a Trailer on a schedule.
# (Alerts + hot-refresh can be added as extra steps later, once auth + email
#  are wired up.)

on:
  schedule:
    - cron: "0 */2 * * *"     # every 2 hours, UTC. Use "*/30 * * * *" for every 30 min.
  workflow_dispatch: {}        # adds a manual "Run workflow" button for testing

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest Bring a Trailer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python radar_worker.py --source bringatrailer --limit 40

      - name: Ingest RM Sotheby's
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        # RM is a JSON API; one run pulls every upcoming sale (auto-discovered).
        # Pin specific sales with RADAR_RM_AUCTIONS: "tc26,mo26" if ever needed.
        run: python radar_worker.py --source rmsothebys

      - name: Ingest Bonhams Cars
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        # Live house (cars.bonhams.com __NEXT_DATA__ SSR, no auth). One run pulls
        # every upcoming/preview lot across its open sales plus the department's
        # record-sale highlights (-> sales_history comps). Live lots aren't
        # online-harvested, so the harvest pass below is a no-op for this source.
        run: python radar_worker.py --source bonhamscars

      - name: Harvest results (closed online lots -> comps)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        # Re-fetches BaT lots whose auction has ended, reads the sold price, and
        # records it into sales_history (real comps). RM results are captured at
        # ingest, so this pass covers the online houses.
        run: python radar_worker.py --harvest-results
