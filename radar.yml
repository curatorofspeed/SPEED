# Auction Radar — scheduled pipeline
# Place at .github/workflows/radar.yml in your repo.
# Set repo secrets (Settings -> Secrets and variables -> Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_KEY, RESEND_API_KEY, ALERT_FROM
#
# GitHub's scheduler floors at 5 min and can run late under load. For
# sub-5-minute hot refresh, run the worker's --loop mode on an always-on host
# (Railway / Fly / Render / a small VPS) instead:
#   python radar_worker.py --loop --hot-every 60 --full-every 30 --alert-every 10

name: Auction Radar

on:
  workflow_dispatch:            # manual run (does a full ingest)
  schedule:
    - cron: "*/30 * * * *"      # full ingest — every 30 min
    - cron: "*/5 * * * *"       # hot refresh + alerts — every 5 min

concurrency:
  group: radar
  cancel-in-progress: false     # never interrupt an in-flight ingest

jobs:
  radar:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
      ALERT_FROM:           ${{ secrets.ALERT_FROM }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Full ingest
        if: github.event.schedule == '*/30 * * * *' || github.event_name == 'workflow_dispatch'
        run: python radar_worker.py --source bringatrailer

      - name: Hot refresh (lots closing soon)
        if: github.event.schedule == '*/5 * * * *'
        run: python radar_worker.py --refresh-hot --hot-hours 6

      - name: Alerts
        if: github.event.schedule == '*/5 * * * *'
        run: python radar_worker.py --alerts
